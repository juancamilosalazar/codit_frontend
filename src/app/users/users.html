<div class="dashboard">
  <header class="dashboard-header">
    <div class="header-content">
      <h1>Panel de Usuarios</h1>
      <button class="logout-btn" (click)="logout()">
        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path>
          <polyline points="16 17 21 12 16 7"></polyline>
          <line x1="21" y1="12" x2="9" y2="12"></line>
        </svg>
        Cerrar Sesión
      </button>
    </div>
  </header>

  <main class="dashboard-content">
    <div *ngIf="errorMsg" class="alert-error">
      {{ errorMsg }}
    </div>

    <div class="users-grid" *ngIf="users$ | async as users">
      <div *ngIf="users.length === 0 && !errorMsg" class="no-data">
        <div class="loader"></div>
        <p>Cargando información o no hay datos disponibles...</p>
      </div>

      <div class="user-card" *ngFor="let user of users">
        <div class="user-avatar">
          {{ user.nombre.charAt(0) }}
        </div>
        <div class="user-info">
          <h3>{{ user.nombre }}</h3>
          <p class="user-email">{{ user.email }}</p>
          <span class="user-age">{{ user.edad }} años</span>
        </div>
      </div>
    </div>
  </main>
</div>
